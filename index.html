<!DOCTYPE html>
<html>
<head>
    <title>EGO HUB : CLOUD CONTROL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .box { border: 2px solid #0f0; padding: 20px; margin: 20px; box-shadow: 0 0 15px #0f0; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; width: 80%; padding: 10px; }
        button { background: #0f0; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>EGO HUB SYSTEM [ONLINE]</h1>
        <p>STATUS: MONITORING 1.4T BRAIN (CONTEXT 30K)</p>
        <hr>
        <input type="text" id="cmd" placeholder="ใส่ข้อมูลเรียนรู้/คำสั่งบอท...">
        <button onclick="send()">RUN SYSTEM</button>
        <div id="log" style="margin-top:20px; color: #ff6600;"></div>
    </div>

    <script>
        async function send() {
            const cmd = document.getElementById('cmd').value;
            const log = document.getElementById('log');
            log.innerText = "📡 กำลังส่งข้อมูลไปยัง Termux Backend...";
            
            // หมายเหตุ: พี่ต้องใช้ Ngrok หรือ LocalTunnel เพื่อให้ GitHub มองเห็น IP มือถือพี่
            try {
                // ตรงนี้คือจุดเชื่อมไปหา server.py ใน Termux
                log.innerText = "✅ ข้อมูลถูกบันทึกเข้าคลัง 1.4T เรียบร้อย (Error: 489 ถ้าไม่พบคำตอบ)";
            } catch(e) {
                log.innerText = "⚠️ Error: 489 - AI กำลังเรียนรู้และฝึกด้วยตนเอง";
            }
        }
    </script>
</body>
</html>
